# Warm editorial theme. Cohesive look regardless of the viewer's light/dark
# setting. (secrets.toml lives next to this and is gitignored.)
[theme]
base = "light"
primaryColor = "#c0573c"
backgroundColor = "#f7f3ec"
secondaryBackgroundColor = "#efe7da"
textColor = "#23201b"

[server]
maxUploadSize = 200

[client]
# Hide the developer toolbar and its keyboard shortcuts (so Cmd+C doesn't open
# the "Clear caches" dialog, and a viewer never sees Rerun/Deploy controls).
toolbarMode = "minimal"
